# WhatsApp Disparador — v8 (Baileys direto, sem Evolution API)
# Apenas 3 serviços: app, postgres, redis
services:
  app:
    build: .
    container_name: disparador-app
    restart: always
    ports:
      - "3000:3000"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: disparador
      DB_USER: disparador
      DB_PASSWORD: ${DB_PASSWORD:-disparador123}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      PORT: 3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./credentials:/app/credentials
    networks:
      - disparador-net

  postgres:
    image: postgres:16-alpine
    container_name: disparador-postgres
    restart: always
    environment:
      POSTGRES_DB: disparador
      POSTGRES_USER: disparador
      POSTGRES_PASSWORD: ${DB_PASSWORD:-disparador123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U disparador"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - disparador-net

  redis:
    image: redis:7-alpine
    container_name: disparador-redis
    restart: always
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - disparador-net

volumes:
  postgres_data:
  redis_data:

networks:
  disparador-net:
    driver: bridge