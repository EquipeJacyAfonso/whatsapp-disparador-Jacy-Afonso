services:
  app:
    build: .
    container_name: disparador-app
    restart: always
    ports:
      - "3000:3000"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: disparador
      DB_USER: disparador
      DB_PASSWORD: ${DB_PASSWORD:-disparador123}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      EVOLUTION_API_URL: http://evolution-api:8080
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY:-minhachave123}
      PORT: 3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./credentials:/app/credentials
    networks:
      - disparador-net

  postgres:
    image: postgres:16-alpine
    container_name: disparador-postgres
    restart: always
    environment:
      POSTGRES_DB: disparador
      POSTGRES_USER: disparador
      POSTGRES_PASSWORD: ${DB_PASSWORD:-disparador123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U disparador"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - disparador-net

  redis:
    image: redis:7-alpine
    container_name: disparador-redis
    restart: always
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - disparador-net

  evolution-api:
    image: atendai/evolution-api:latest
    container_name: disparador-evolution
    restart: always
    ports:
      - "8080:8080"
    environment:
      # Configurações básicas exigidas na V2
      - SERVER_URL=http://localhost:8080
      - AUTHENTICATION_TYPE=apikey
      - AUTHENTICATION_API_KEY=minhachave123
      
      # Conectando a Evolution ao seu Postgres já existente
      - DATABASE_ENABLED=true
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://disparador:${DB_PASSWORD:-disparador123}@postgres:5432/disparador?schema=evolution
      - CORS_ORIGIN=*
      - CORS_METHODS=POST,GET,PUT,DELETE,PATCH,OPTIONS
      - CORS_CREDENTIALS=true
    volumes:
      - evolution_instances:/evolution/instances
    networks:
      - disparador-net

evolution-manager:
    image: evolutionapi/evolution-manager:latest
    container_name: disparador-manager
    restart: always
    ports:
      - "8081:80"
    environment:
      - NODE_ENV=production
    networks:
      - disparador-net

volumes:
  postgres_data:
  redis_data:
  evolution_instances:

networks:
  disparador-net:
    driver: bridge
